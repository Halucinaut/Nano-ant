name: zao_tagging_classification
type: external_prompt
goal: 优化 zao-workflow 的 tagging/classification prompt，在代表性 case 上提高分类准确率并保持摘要简洁。

target:
  path: prompt_use.md
  sync_to: ${ZAO_WORKFLOW_PATH}/prompts/tagging/classification.md

judge:
  skill: judge_skills/tagging_quality_skill.yaml

run:
  command: python3 "${ZAO_WORKFLOW_PATH}/tests/unit/test_tagging_classify\&summarize.py"
  result_json: ${ZAO_WORKFLOW_PATH}/logs/test_tagging_result_*.json

context:
  files:
    - README.md
